<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akshay Saklani | Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #7928ca;
            --secondary: #ff0080;
            --bg-dark: #050505;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
        }

        * { box-sizing: border-box; transition: all 0.3s ease; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 20% 20%, #1a1033 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, #331020 0%, transparent 40%);
            color: var(--text-main);
            margin: 0;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Animated Background Particles */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.3;
            z-index: -1;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 60px 20px;
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 50px;
        }

        /* Profile Sidebar */
        .sidebar {
            position: sticky;
            top: 60px;
            height: fit-content;
            text-align: center;
        }

        .avatar-container {
            position: relative;
            display: inline-block;
            margin-bottom: 25px;
        }

        .avatar {
            width: 220px;
            height: 220px;
            border-radius: 30px;
            object-fit: cover;
            border: 2px solid var(--glass-border);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .avatar-container::after {
            content: '';
            position: absolute;
            inset: -10px;
            border-radius: 35px;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            z-index: -1;
            filter: blur(15px);
            opacity: 0.5;
        }

        h1 { font-size: 2rem; margin: 10px 0; letter-spacing: -1px; }
        .tagline { color: var(--secondary); font-weight: 600; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 2px; }
        .bio { color: var(--text-muted); line-height: 1.6; margin: 20px 0; }

        /* Social Links */
        .social-links { display: flex; justify-content: center; gap: 15px; margin-top: 20px; }
        .social-icon {
            width: 40px; height: 40px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            color: white; text-decoration: none;
        }
        .social-icon:hover { background: var(--primary); transform: translateY(-5px); }

        /* Repository Cards */
        .section-title { font-size: 1.5rem; margin-bottom: 25px; display: flex; align-items: center; gap: 10px; }
        .section-title i { color: var(--primary); }

        .repo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }

        .repo-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 25px;
            position: relative;
            overflow: hidden;
        }

        .repo-card:hover {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-5px) scale(1.02);
        }

        .repo-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 4px; height: 100%;
            background: linear-gradient(to bottom, var(--primary), var(--secondary));
            opacity: 0;
        }
        .repo-card:hover::before { opacity: 1; }

        .repo-name {
            color: var(--text-main);
            font-size: 1.2rem;
            font-weight: 700;
            text-decoration: none;
            display: block;
            margin-bottom: 10px;
        }

        .repo-desc { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 20px; min-height: 40px; }

        .repo-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .lang-tag {
            background: rgba(121, 40, 202, 0.2);
            color: #d6b4ff;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 600;
        }

        /* Mobile Responsive */
        @media (max-width: 850px) {
            .container { grid-template-columns: 1fr; padding-top: 20px; }
            .sidebar { position: relative; top: 0; margin-bottom: 40px; }
        }

        /* Skills Chips */
        .skills { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 20px; justify-content: center; }
