<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akshay Saklani | GitHub Portfolio</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --border-color: #30363d;
            --text-main: #e6edf3;
            --text-muted: #848d97;
            --link-blue: #58a6ff;
            --btn-bg: #21262d;
            --accent-green: #238636;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            line-height: 1.5;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 32px;
        }

        /* Profile Sidebar */
        .sidebar {
            display: flex;
            flex-direction: column;
        }

        .avatar {
            width: 260px;
            height: 260px;
            border-radius: 50%;
            border: 1px solid var(--border-color);
            background: linear-gradient(45deg, #30363d, #161b22);
            margin-bottom: 16px;
        }

        h1 { font-size: 24px; margin: 0; }
        .username { font-size: 20px; color: var(--text-muted); font-weight: 300; }
        .bio { margin: 16px 0; font-size: 16px; }

        .btn {
            background-color: var(--btn-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 6px 16px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            font-size: 14px;
        }

        .btn:hover { background-color: #30363d; border-color: #8b949e; }

        /* Main Content */
        .nav-tabs {
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 20px;
            display: flex;
            gap: 16px;
        }

        .tab {
            padding: 8px 16px;
            color: var(--text-main);
            text-decoration: none;
            border-bottom: 2px solid transparent;
            font-size: 14px;
        }

        .tab.active { border-bottom-color: #f78166; font-weight: 600; }

        .repo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 16px;
        }

        .repo-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            transition: 0.2s;
        }

        .repo-card:hover { border-color: var(--text-muted); }

        .repo-header { display: flex; align-items: center; justify-content: space-between; }

        .repo-name {
            color: var(--link-blue);
            font-weight: 600;
            text-decoration: none;
            font-size: 14px;
        }

        .repo-name:hover { text-decoration: underline; }

        .label {
            font-size: 12px;
            border: 1px solid var(--border-color);
            padding: 0 7px;
            border-radius: 20px;
            color: var(--text-muted);
        }

        .repo-desc {
            font-size: 12px;
            color: var(--text-muted);
            margin: 8px 0 16px 0;
            flex-grow: 1;
        }

        .repo-meta {
            font-size: 12px;
            color: var(--text-muted);
            display: flex;
            gap: 15px;
        }

        /* Loading Animation */
        #loader { text-align: center; grid-column: 1 / -1; padding: 50px; color: var(--text-muted); }

        @media (max-width: 768px) {
            .container { grid-template-columns: 1fr; }
            .sidebar { align-items: center; text-align: center; }
            .avatar { width: 150px; height: 150px; }
        }
    </style>
</head>
<body>

<div class="container">
    <aside class="sidebar">
        <img src="https://github.com/akshaysaklani.png" alt="Akshay Saklani" class="avatar">
        <h1>Akshay Saklani</h1>
        <div class="username">akshaysaklani</div>
        <p class="bio">Developer | Explorer | Tech Enthusiast</p>
        <a href="https://github.com/akshaysaklani" class="btn">View on GitHub</a>
    </aside>

    <main>
        <nav class="nav-tabs">
            <a href="#" class="tab active">Overview</a>
            <a href="#" class="tab">Repositories</a>
        </nav>

        <section id="repo-container" class="repo-grid">
            <div id="loader">Fetching latest repositories...</div>
        </section>
    </main>
</div>

<script>
